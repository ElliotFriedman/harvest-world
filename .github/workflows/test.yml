name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        working-directory: contracts
        run: forge build

      - name: Unit tests
        working-directory: contracts
        run: forge test --match-path "test/unit/*" -vvv

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Forge lint
        working-directory: contracts
        run: forge lint --check

  deploy-check:
    name: Deploy Script Compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Compile including scripts
        working-directory: contracts
        run: forge build --build-info

  integration:
    name: Fork Tests (World Chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Fork tests
        working-directory: contracts
        run: forge test --match-path "test/integration/*" -vvv
        env:
          WORLD_CHAIN_RPC_URL: https://worldchain.drpc.org
