<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvest — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #00ff00;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    position: relative;
  }

  /* Subtle scanline overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 0, 0.015) 2px,
      rgba(0, 255, 0, 0.015) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Subtle vignette */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 5;
  }

  .content {
    text-align: left;
    z-index: 2;
    max-width: 900px;
    padding: 0 40px;
  }

  .logo {
    font-size: 96px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }

  .logo .prompt {
    color: #666666;
  }

  .logo .cursor {
    animation: blink 1.06s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .tagline {
    font-size: 36px;
    font-weight: 400;
    color: #f5a623;
    margin-bottom: 64px;
    padding-left: 2ch;
  }

  .details {
    padding-left: 2ch;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .details .line {
    font-size: 20px;
    font-weight: 400;
    color: #00aa00;
    line-height: 1.6;
  }

  .details .line .dim {
    color: #666666;
  }

  .details .line .bright {
    color: #00ff00;
    font-weight: 700;
  }

  .bottom-bar {
    position: absolute;
    bottom: 40px;
    left: 40px;
    right: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
  }

  .bottom-bar .left {
    font-size: 14px;
    font-weight: 400;
    color: #666666;
  }

  .bottom-bar .right {
    font-size: 14px;
    font-weight: 400;
    color: #666666;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo"><span class="prompt">&gt; </span>harvest<span class="cursor">_</span></div>
    <div class="tagline">DeFi, for humans.</div>
    <div class="details">
      <div class="line"><span class="dim">//</span> the first yield aggregator on <span class="bright">World Chain</span></div>
      <div class="line"><span class="dim">//</span> auto-compounding Morpho vault rewards</div>
      <div class="line"><span class="dim">//</span> every depositor verified human via <span class="bright">World ID</span></div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="left">ETHGlobal Cannes 2026</span>
    <span class="right">github.com/ElliotFriedman/harvest-world</span>
  </div>
</body>
</html>
